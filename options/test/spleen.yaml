# general setting
name: fuss_spleen_star_testmesh_mixed
backend: dp # DataParallel
type: FussModel
num_gpu: auto
manual_seed: 1234
visualize: true
pose_timestep: 6


# path
path:
  resume_state: ./experiments/fuss_spleen_star_testmesh_mixed/models/best.pth
  resume: False

# datasets
datasets:
  0_reference_dataset:
    name: Reference
    type: PairSpleenDataset
    data_root: ../data/spleen
    phase: train
    return_evecs: True
    return_faces: True
    num_evecs: 40
    start_index: 3
    end_index: 36
    addi_index1: 0
    addi_index2: 1
    addi_index3: 39
    addi_index4: 40

  1_train_dataset:
    name: Train
    type: SinglePancreasDataset
    data_root: ../data/spleen
    phase: train
    return_evecs: True
    return_faces: True
    num_evecs: 40
    start_index: 3
    end_index: 36
    addi_index1: 0
    addi_index2: 1
    addi_index3: 39
    addi_index4: 40

  2_test_dataset:
    name: Test
    type: SinglePancreasDataset
    data_root: ../data/spleen
    phase: test
    return_evecs: True
    return_faces: True
    num_evecs: 40
    start_index: 36
    end_index: 39
    addi_index1: 2
    addi_index2: ~
    addi_index3: ~
    addi_index4: ~

# network setting
networks:
  feature_extractor:
    type: DiffusionNet
    in_channels: 128
    out_channels: 384
    cache_dir: ../data/spleen/diffusion
    input_type: wks
  fmap_net:
    type: RegularizedFMNet
    bidirectional: true
  permutation:
    type: Similarity
    tau: 0.07
    hard: false
  interpolator:
    type: ResnetECPos
    c_dim: 3
    dim: 7
    hidden_dim: 128

# training setting - to compute best reference shape
train:
  total_epochs: 15
  optims:
    feature_extractor:
      type: Adam
      lr: 1.0e-3
    interpolator:
      type: Adam
      lr: 1.0e-3
  schedulers:
    feature_extractor:
      type: CosineAnnealingLR
      eta_min: 1.0e-4
      T_max: 10
    interpolator:
      type: CosineAnnealingLR
      eta_min: 1.0e-4
      T_max: 10
  losses:
    surfmnet_loss:
      type: SURFMNetLoss
      w_bij: 1.0
      w_orth: 1.0
      w_lap: 0.0
    couple_loss:
      type: SquaredFrobeniusLoss
      loss_weight: 1.0
    cluster_loss:
      type: ClusterLoss
      loss_weight: 0.1
    align_loss:
      type: SquaredFrobeniusLoss
      loss_weight: 10.0
    symmetry_loss:
      type: SquaredFrobeniusLoss
      loss_weight: 1.0
    smoothness_loss:
      type: DirichletLoss
      loss_weight: 2.0
    dirichlet_shape_loss:
      type: DirichletLoss
      loss_weight: 1.0e+2
    chamfer_shape_loss:
      type: ChamferLoss
      loss_weight: 1.0e+4
    edge_shape_loss:
      type: EdgeLoss
      loss_weight: 1.0e+5

# validation setting
val:
  metrics:
    specificity:
      type: calculate_specificity
    generalization:
      type: calculate_generalization

